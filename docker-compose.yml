services:
  app:
    build: .
    shm_size: "1gb"
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://admin:admin@mongo:27017/sky_mall_db?authSource=admin
      PG_HOST: postgres
      PG_PORT: 5432
    volumes:
      - ./utils:/app/utils   # cookie files persist on host
    depends_on:
      mongo:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: sky_mall_db
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecommerce_scraper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce_scraper"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
  pg_data:
